<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MotoSnap — Offline</title>
<style>
  body{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#eef0ec;font-family:'Inter',sans-serif;padding:24px;text-align:center;}
  .wrap{max-width:300px;}
  .icon{font-size:64px;margin-bottom:20px;}
  h1{font-size:22px;font-weight:800;color:#1a2e1a;margin-bottom:8px;}
  p{font-size:14px;color:#6a8a6a;line-height:1.6;margin-bottom:24px;}
  button{padding:14px 32px;background:#2a6644;color:#fff;border:none;border-radius:100px;font-weight:700;font-size:15px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🏍️</div>
  <h1>Sei offline</h1>
  <p>Controlla la connessione internet e riprova. Le moto del tuo garage sono sempre accessibili offline.</p>
  <button onclick="location.reload()">↺ Riprova</button>
</div>
</body>
</html>
